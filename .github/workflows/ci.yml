name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django Tests
        env:
          DJANGO_SECRET_KEY: dummy_secret_key_for_testing
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy
          EMAIL_HOST_USER: dummy@example.com
          EMAIL_HOST_PASSWORD: dummy
          CELERY_BROKER_URL: memory://
        run: python manage.py test

  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          # tam thoi de false de khong push len docker hub
          push: false
          tags: elearning-backend:latest
          # push: true
          # tags: ${{ secrets.DOCKERHUB_USERNAME }}/elearning-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
